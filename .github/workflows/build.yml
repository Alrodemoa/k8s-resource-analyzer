name: CI / Release

on:
  # Проверка при открытии или обновлении Pull Request
  pull_request:
    branches: [main]

  # Полный пайплайн при пуше тега релиза
  push:
    tags: ['v*']

  # Ручной запуск из интерфейса GitHub
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:

  # ─── Линтер и тесты (всегда) ─────────────────────────────────────────────
  test:
    name: Линтер и тесты
    runs-on: ubuntu-latest
    container:
      image: golang:1.26-alpine
    steps:
      - name: Установка системных зависимостей
        run: apk add --no-cache git ca-certificates

      - uses: actions/checkout@v4

      - name: Загрузка Go-зависимостей
        run: go mod download && go mod tidy

      - name: Линтер (go vet)
        run: go vet ./...

      - name: Тесты
        run: go test -v -count=1 ./cmd/k8s-analyzer/...


  # ─── Сборка через GoReleaser snapshot (всегда, без публикации) ───────────
  build:
    name: Сборка (snapshot)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: GoReleaser snapshot (все платформы, без публикации)
        uses: goreleaser/goreleaser-action@v5
        with:
          version: '~> v2'
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # dist/ создаётся локально и не сохраняется — только проверка сборки

      - name: Настройка Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Сборка Docker образа (без публикации)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          tags: k8s-analyzer:snapshot

  # ─── GoReleaser: сборка + архивы + DEB/RPM + GitHub Release ──────────────
  goreleaser:
    name: GoReleaser (release)
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # GoReleaser требует полную историю для корректной работы с тегами
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Очистить существующие файлы из релиза (защита от повторного запуска)
        run: |
          gh release view "${{ github.ref_name }}" --json assets \
            --jq '.assets[].name' 2>/dev/null | \
            xargs -r -I {} gh release delete-asset "${{ github.ref_name }}" {} --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Запуск GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Docker образ на Alpine → ghcr.io ────────────────────────────────────
  docker:
    name: Docker образ (ghcr.io)
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Авторизация в GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Имя образа в нижнем регистре (ghcr.io требует lowercase)
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Настройка QEMU (для multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Настройка Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Сборка и публикация multi-arch образа
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ghcr.io/${{ env.IMAGE_NAME }}:latest

  # ─── MSI пакет Windows ───────────────────────────────────────────────────
  # На PR: только сборка (проверка). На теге: сборка + загрузка в релиз.
  # always() позволяет запускаться даже когда goreleaser пропущен (PR).
  build-msi:
    name: Windows MSI
    needs: goreleaser
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Версия из тега
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Скачать Windows бинарник из релиза (GoReleaser уже собрал)
        shell: bash
        run: |
          gh release download "${{ github.ref_name }}" \
            --pattern "k8s-analyzer-windows-amd64.zip" \
            --dir /tmp/win
          cd /tmp/win && unzip k8s-analyzer-windows-amd64.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Установка go-msi
        shell: bash
        run: |
          go install github.com/mh-cbon/go-msi@latest
          echo "C:\\Program Files (x86)\\WiX Toolset v3.11\\bin" >> $GITHUB_PATH

      - name: Сборка MSI
        shell: bash
        run: |
          # Всё на C:\ — go-msi не умеет строить relative path между разными дисками
          WORK="$RUNNER_TEMP/msi-work"
          mkdir -p "$WORK"
          cp /tmp/win/k8s-analyzer.exe "$WORK/k8s-analyzer.exe"
          cp packaging/wix/wix.json   "$WORK/wix.json"
          cp LICENSE                  "$WORK/LICENSE"
          cd "$WORK"
          go-msi make \
            --msi "$WORK/k8s-analyzer-windows-amd64.msi" \
            --version "${{ env.VERSION }}" \
            --path wix.json \
            --license LICENSE \
            --arch amd64

      - name: Загрузка MSI в релиз
        shell: bash
        run: gh release upload "${{ github.ref_name }}" "$RUNNER_TEMP/msi-work/k8s-analyzer-windows-amd64.msi"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── macOS .pkg ──────────────────────────────────────────────────────────
  build-macos-pkg:
    name: macOS .pkg
    needs: goreleaser
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Версия из тега
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Скачать macOS бинарники из релиза (GoReleaser уже собрал)
        run: |
          gh release download "${{ github.ref_name }}" \
            --pattern "k8s-analyzer-darwin-amd64.tar.gz" \
            --pattern "k8s-analyzer-darwin-arm64.tar.gz" \
            --dir /tmp/mac
          cd /tmp/mac
          tar -xzf k8s-analyzer-darwin-amd64.tar.gz
          tar -xzf k8s-analyzer-darwin-arm64.tar.gz
          chmod +x k8s-analyzer-darwin-amd64 k8s-analyzer-darwin-arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Сборка .pkg (Intel AMD64)
        run: |
          mkdir -p pkg-amd64/usr/local/bin
          cp /tmp/mac/k8s-analyzer-darwin-amd64 pkg-amd64/usr/local/bin/k8s-analyzer
          chmod +x pkg-amd64/usr/local/bin/k8s-analyzer
          pkgbuild \
            --root pkg-amd64 \
            --identifier com.alrodemoa.k8s-analyzer \
            --version "${{ env.VERSION }}" \
            --install-location / \
            /tmp/mac/k8s-analyzer-darwin-amd64.pkg

      - name: Сборка .pkg (Apple Silicon ARM64)
        run: |
          mkdir -p pkg-arm64/usr/local/bin
          cp /tmp/mac/k8s-analyzer-darwin-arm64 pkg-arm64/usr/local/bin/k8s-analyzer
          chmod +x pkg-arm64/usr/local/bin/k8s-analyzer
          pkgbuild \
            --root pkg-arm64 \
            --identifier com.alrodemoa.k8s-analyzer \
            --version "${{ env.VERSION }}" \
            --install-location / \
            /tmp/mac/k8s-analyzer-darwin-arm64.pkg

      - name: Загрузка .pkg в релиз
        run: |
          gh release upload "${{ github.ref_name }}" \
            /tmp/mac/k8s-analyzer-darwin-amd64.pkg \
            /tmp/mac/k8s-analyzer-darwin-arm64.pkg
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
