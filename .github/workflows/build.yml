name: Build and Release

on:
  # Запуск при создании тега или пуше в main/master
  push:
    tags:
      - 'v*'
    branches:
      - main
      - master

  # Запуск вручную из интерфейса GitHub
  workflow_dispatch:

jobs:
  build:
    name: Сборка для всех платформ
    runs-on: ubuntu-latest

    # Весь job выполняется внутри Alpine-контейнера с Go
    container:
      image: golang:1.21-alpine

    steps:
    - name: Установка системных зависимостей
      run: apk add --no-cache git ca-certificates

    - name: Checkout код
      uses: actions/checkout@v4

    - name: Установка зависимостей
      run: |
        go mod download
        go mod tidy

    - name: Создание директории bin
      run: mkdir -p bin

    - name: Сборка Linux AMD64
      run: |
        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "-s -w" -o bin/k8s-analyzer-linux-amd64 ./cmd/k8s-analyzer
        chmod +x bin/k8s-analyzer-linux-amd64

    - name: Сборка Linux ARM64
      run: |
        CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags "-s -w" -o bin/k8s-analyzer-linux-arm64 ./cmd/k8s-analyzer
        chmod +x bin/k8s-analyzer-linux-arm64

    - name: Сборка macOS Intel (AMD64)
      run: |
        CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags "-s -w" -o bin/k8s-analyzer-darwin-amd64 ./cmd/k8s-analyzer
        chmod +x bin/k8s-analyzer-darwin-amd64

    - name: Сборка macOS Apple Silicon (ARM64)
      run: |
        CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags "-s -w" -o bin/k8s-analyzer-darwin-arm64 ./cmd/k8s-analyzer
        chmod +x bin/k8s-analyzer-darwin-arm64

    - name: Сборка Windows AMD64
      run: |
        CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags "-s -w" -o bin/k8s-analyzer-windows-amd64.exe ./cmd/k8s-analyzer

    - name: Создание SHA256 контрольных сумм
      run: |
        cd bin
        sha256sum * > SHA256SUMS.txt
        cat SHA256SUMS.txt

    - name: Показать размеры бинарников
      run: ls -lh bin/

    # Загрузка артефактов для любого пуша
    - name: Загрузка артефактов
      uses: actions/upload-artifact@v4
      with:
        name: k8s-analyzer-binaries
        path: bin/*
        retention-days: 7

    # Создание релиза только при пуше тега
    - name: Создание GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          bin/k8s-analyzer-linux-amd64
          bin/k8s-analyzer-linux-arm64
          bin/k8s-analyzer-darwin-amd64
          bin/k8s-analyzer-darwin-arm64
          bin/k8s-analyzer-windows-amd64.exe
          bin/SHA256SUMS.txt
        body: |
          ## K8s Analyzer ${{ github.ref_name }}

          ### Скачать бинарники:

          | Платформа | Архитектура | Файл |
          |-----------|-------------|------|
          | Linux | AMD64 | `k8s-analyzer-linux-amd64` |
          | Linux | ARM64 | `k8s-analyzer-linux-arm64` |
          | macOS | Intel | `k8s-analyzer-darwin-amd64` |
          | macOS | Apple Silicon | `k8s-analyzer-darwin-arm64` |
          | Windows | AMD64 | `k8s-analyzer-windows-amd64.exe` |

          ### Установка:

          **Linux/macOS:**
          ```bash
          curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/k8s-analyzer-linux-amd64
          chmod +x k8s-analyzer-linux-amd64
          ./k8s-analyzer-linux-amd64 -b 50
          ```

          **Windows:**
          ```powershell
          k8s-analyzer-windows-amd64.exe -b 50
          ```

          ### Проверка контрольных сумм:

          ```bash
          sha256sum -c SHA256SUMS.txt
          ```
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
