name: CI / Release

on:
  # Проверка при открытии или обновлении Pull Request
  pull_request:
    branches: [main]

  # Полный пайплайн при пуше тега релиза
  push:
    tags: ['v*']

  # Ручной запуск из интерфейса GitHub
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:

  # ─── Линтер и тесты (всегда) ─────────────────────────────────────────────
  test:
    name: Линтер и тесты
    runs-on: ubuntu-latest
    container:
      image: golang:1.26-alpine
    steps:
      - name: Установка системных зависимостей
        run: apk add --no-cache git ca-certificates

      - uses: actions/checkout@v4

      - name: Загрузка Go-зависимостей
        run: go mod download && go mod tidy

      - name: Линтер (go vet)
        run: go vet ./...

      - name: Тесты
        run: go test -v -count=1 ./cmd/k8s-analyzer/...


  # ─── Сборка через GoReleaser snapshot (всегда, без публикации) ───────────
  build:
    name: Сборка (snapshot)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: GoReleaser snapshot (все платформы, без публикации)
        uses: goreleaser/goreleaser-action@v5
        with:
          version: '~> v2'
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # dist/ создаётся локально и не сохраняется — только проверка сборки

      - name: Настройка Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Сборка Docker образа (без публикации)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          tags: k8s-analyzer:snapshot

  # ─── GoReleaser: сборка + архивы + DEB/RPM + GitHub Release ──────────────
  goreleaser:
    name: GoReleaser (release)
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # GoReleaser требует полную историю для корректной работы с тегами
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Обновить версию в README
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/v[0-9]\+\.[0-9]\+\.[0-9]\+  ·/v${VERSION}  ·/" README.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: bump version to v${VERSION} in README"
          git push origin HEAD:main

      - name: Запуск GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Docker образ на Alpine → ghcr.io ────────────────────────────────────
  docker:
    name: Docker образ (ghcr.io)
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Авторизация в GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Настройка QEMU (для multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Настройка Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Сборка и публикация multi-arch образа
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest

  # ─── MSI пакет Windows ───────────────────────────────────────────────────
  # На PR: только сборка (проверка). На теге: сборка + загрузка в релиз.
  # always() позволяет запускаться даже когда goreleaser пропущен (PR).
  build-msi:
    name: Windows MSI
    needs: [test, goreleaser]
    if: |
      always() &&
      needs.test.result == 'success' &&
      (needs.goreleaser.result == 'success' || needs.goreleaser.result == 'skipped')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Версия из тега
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Сборка Windows бинарника
        shell: bash
        run: |
          mkdir -p msi-work
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -buildvcs=false \
            -ldflags "-s -w" \
            -o msi-work/k8s-analyzer.exe ./cmd/k8s-analyzer

      - name: Установка go-msi (WiX уже есть на Windows runner)
        shell: bash
        run: |
          go install github.com/mh-cbon/go-msi@latest
          # Добавляем WiX в PATH если ещё не там
          echo "C:\\Program Files (x86)\\WiX Toolset v3.11\\bin" >> $GITHUB_PATH

      - name: Сборка MSI
        shell: bash
        run: |
          cp packaging/wix/wix.json msi-work/wix.json
          cp LICENSE msi-work/LICENSE
          mkdir -p dist
          cd msi-work
          go-msi make \
            --msi ../dist/k8s-analyzer-windows-amd64.msi \
            --version "${{ env.VERSION }}" \
            --path .

      - name: Загрузка MSI в релиз
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: gh release upload "${{ github.ref_name }}" dist/k8s-analyzer-windows-amd64.msi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── macOS .pkg ──────────────────────────────────────────────────────────
  # На PR: только сборка (проверка). На теге: сборка + загрузка в релиз.
  build-macos-pkg:
    name: macOS .pkg
    needs: [test, goreleaser]
    if: |
      always() &&
      needs.test.result == 'success' &&
      (needs.goreleaser.result == 'success' || needs.goreleaser.result == 'skipped')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Версия из тега
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Сборка macOS бинарников (amd64 + arm64)
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -buildvcs=false \
            -ldflags "-s -w" -o dist/k8s-analyzer-darwin-amd64 ./cmd/k8s-analyzer
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -buildvcs=false \
            -ldflags "-s -w" -o dist/k8s-analyzer-darwin-arm64 ./cmd/k8s-analyzer
          chmod +x dist/k8s-analyzer-darwin-amd64 dist/k8s-analyzer-darwin-arm64

      - name: Сборка .pkg (Intel AMD64)
        run: |
          mkdir -p pkg-amd64/usr/local/bin
          cp dist/k8s-analyzer-darwin-amd64 pkg-amd64/usr/local/bin/k8s-analyzer
          chmod +x pkg-amd64/usr/local/bin/k8s-analyzer
          pkgbuild \
            --root pkg-amd64 \
            --scripts packaging/macos/scripts \
            --identifier com.alrodemoa.k8s-analyzer \
            --version "${{ env.VERSION }}" \
            --install-location / \
            dist/k8s-analyzer-darwin-amd64.pkg

      - name: Сборка .pkg (Apple Silicon ARM64)
        run: |
          mkdir -p pkg-arm64/usr/local/bin
          cp dist/k8s-analyzer-darwin-arm64 pkg-arm64/usr/local/bin/k8s-analyzer
          chmod +x pkg-arm64/usr/local/bin/k8s-analyzer
          pkgbuild \
            --root pkg-arm64 \
            --scripts packaging/macos/scripts \
            --identifier com.alrodemoa.k8s-analyzer \
            --version "${{ env.VERSION }}" \
            --install-location / \
            dist/k8s-analyzer-darwin-arm64.pkg

      - name: Загрузка .pkg в релиз
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          gh release upload "${{ github.ref_name }}" \
            dist/k8s-analyzer-darwin-amd64.pkg \
            dist/k8s-analyzer-darwin-arm64.pkg
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
